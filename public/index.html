<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand d-flex align-items-center">
          <img src="assets/img/logo.png" width="50" />
          <span class="ms-2">Pokemon App</span>
        </span>

        <button class="btn btn-warning" onclick="toggleDarkMode()">🌙</button>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row g-4">
        <!-- PANEL USUARIOS (NUEVO) -->
        <div
          class="modal fade"
          id="usuariosModal"
          tabindex="-1"
          aria-labelledby="usuariosModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="usuariosModalLabel">
                  Usuarios
                </h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <ul id="listaDeUsuarios" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>

        <!-- USUARIOS -->
        <div class="col-md-4" id="colUsuarios">
          <div class="card pokedex-card border-danger">
            <div class="card-header bg-danger text-white">
              <h5>Usuarios</h5>
            </div>

            <div class="card-body">
              <input
                id="cedula"
                class="form-control mb-2"
                placeholder="Cédula"
              />
              <input
                id="nombre"
                class="form-control mb-2"
                placeholder="Nombre"
              />
              <input id="email" class="form-control mb-2" placeholder="Email" />
              <input id="edad" class="form-control mb-2" placeholder="Edad" />

              <div class="d-grid gap-2">
                <button class="btn btn-danger" onclick="crearUsuario()">
                  Guardar
                </button>
                <button class="btn btn-warning" onclick="actualizarUsuario()">
                  Actualizar
                </button>
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-toggle="modal"
                  data-bs-target="#usuariosModal"
                  onclick="cargarUsuariosPanel()"
                >
                  Listar
                </button>
                <button class="btn btn-dark" onclick="eliminarUsuario()">
                  Eliminar
                </button>
              </div>

              <hr />
            </div>
          </div>
        </div>

        <!-- POKEMON -->
        <div class="col-md-4" id="colPokemon">
          <div class="card pokedex-card border-warning">
            <div class="card-header bg-warning">
              <h5>Pokémon</h5>
            </div>

            <div class="card-body">
              <input
                id="buscador"
                class="form-control mb-3"
                placeholder="Buscar Pokémon"
              />
              <div id="listaPokemon" class="row"></div>
            </div>
          </div>
        </div>

        <!-- CAPTURA -->
        <div class="col-md-4" id="colCaptura">
          <div class="card pokedex-card border-primary">
            <div class="card-header bg-primary text-white">
              <h5>Captura</h5>
            </div>

            <div class="card-body">
              <input
                id="usuarioSelect"
                class="form-control mb-2"
                placeholder="Cédula del usuario"
              />
              <select id="pokemonSelect" class="form-control mb-2"></select>

              <button class="btn btn-primary w-100" onclick="capturarPokemon()">
                Capturar
              </button>

              <button
                type="button"
                class="btn btn-secondary w-100 mt-2"
                onclick="cargarCapturasPanel()"
              >
                Listar
              </button>

              <hr />
              <ul id="listaCapturas" class="list-group"></ul>
            </div>
          </div>
        </div>

        <!-- PANEL CAPTURAS DERECHA -->
        <div
          class="modal fade"
          id="capturasModal"
          tabindex="-1"
          aria-labelledby="capturasModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="capturasModalLabel">
                  Pokemones Capturados
                </h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <ul id="listaCapturasPanel" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-3">
        <button
          id="btnToggle"
          class="btn btn-warning px-4"
          onclick="verMasPokemon()"
        >
          Ver más
        </button>
      </div>

      <div id="panelExtra" class="card pokedex-card border-warning mt-4 d-none">
        <div class="card-header bg-warning">
          <h5>Lista pokemones completa</h5>
        </div>
        <div class="card-body">
          <div id="listaPokemonFull" class="row"></div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="toast" class="toast text-bg-dark border-0">
        <div class="d-flex">
          <div class="toast-body" id="toastMsg"></div>
          <button
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="pokemonModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="pokemonNombre"></h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body text-center">
            <img id="pokemonImg" width="150" />
            <p id="pokemonTipo"></p>
            <p id="pokemonPoder"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
